<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Plate Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #999;
            font-size: 0.95em;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .upload-area.active {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 25px;
        }

        button {
            padding: 11px 28px;
            font-size: 0.95em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-predict:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-predict:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e8e8e8;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            margin: 20px 0;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
            font-size: 0.9em;
        }

        .message.active {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .preview-section {
            margin-top: 30px;
            display: none;
        }

        .preview-section.active {
            display: block;
        }

        .preview-section h2 {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .preview-image {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .results-section {
            margin-top: 30px;
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .results-section h2 {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .result-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .result-label {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .result-value {
            color: #555;
        }

        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #f5f7ff;
            border-radius: 6px;
            font-size: 0.85em;
            color: #666;
            display: none;
        }

        .file-info.active {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 License Plate Detector</h1>
            <p>Upload an image to detect license plates</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click to upload or drag & drop</div>
            <div class="upload-subtext">PNG, JPG, JPEG (Max 16MB)</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="file-info" id="fileInfo"></div>

        <div class="button-group">
            <button class="btn-predict" id="predictBtn" disabled>Detect License Plates</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>

        <div class="message" id="message"></div>

        <div class="preview-section" id="previewSection">
            <h2>Processed Image</h2>
            <img id="previewImage" class="preview-image" src="" alt="Preview">
        </div>

        <div class="results-section" id="resultsSection">
            <h2>Detection Results</h2>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const predictBtn = document.getElementById('predictBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const resultsSection = document.getElementById('resultsSection');
        const resultsContent = document.getElementById('resultsContent');
        const fileInfo = document.getElementById('fileInfo');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('active');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('active');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('active');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('Please select a valid image file', 'error');
                return;
            }

            selectedFile = file;
            predictBtn.disabled = false;
            fileInfo.textContent = `Selected: ${file.name} (${(file.size / 1024).toFixed(0)}KB)`;
            fileInfo.classList.add('active');
        }

        predictBtn.addEventListener('click', () => {
            if (selectedFile) runPrediction();
        });

        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            predictBtn.disabled = true;
            previewSection.classList.remove('active');
            resultsSection.classList.remove('active');
            fileInfo.classList.remove('active');
            message.classList.remove('active');
        });

        async function runPrediction() {
            try {
                loading.classList.add('active');
                predictBtn.disabled = true;

                const formData = new FormData();
                formData.append('file', selectedFile);

                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    previewImage.src = data.image;
                    previewSection.classList.add('active');

                    resultsContent.innerHTML = '';
                    if (data.detections_count > 0) {
                        data.results.forEach((det, i) => {
                            const coords = det.coordinates;
                            resultsContent.innerHTML += `
                                <div class="result-item">
                                    <div class="result-label">Detection ${i + 1}</div>
                                    <div class="result-value">
                                        Confidence: ${(det.confidence * 100).toFixed(1)}%<br>
                                        Position: (${coords.x1}, ${coords.y1}) to (${coords.x2}, ${coords.y2})
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        resultsContent.innerHTML = '<div class="result-item"><div class="result-label">No detections found</div></div>';
                    }
                    resultsSection.classList.add('active');
                    showMessage(data.message, 'success');
                } else {
                    showMessage(data.error || 'Prediction failed', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                loading.classList.remove('active');
                predictBtn.disabled = false;
            }
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type} active`;
            setTimeout(() => message.classList.remove('active'), 4000);
        }
    </script>
</body>
</html>
