<!DOCTYPE html>
<html>

<head>
<title>License Plate Detection</title>
</head>

<body>

<h2>Upload Vehicle Image</h2>

<form action="/predict" method="post" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">Detect Plate</button>

</form>

{% if image %}

<h3>Uploaded Image</h3>

<img src="{{ url_for('static', filename='uploads/' + image) }}" width="400">

<h3>Detected Plate</h3>

<p>{{ plate }}</p>

{% endif %}

</body>

</html>
