<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Plate Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
        }

        .upload-area:hover {
            background-color: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background-color: #e8ebff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-predict:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-predict:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #e0e0e0;
            color: #333;
        }

        .btn-clear:hover {
            background: #d0d0d0;
        }

        .preview-section {
            margin-top: 40px;
            display: none;
        }

        .preview-section.active {
            display: block;
        }

        .preview-title {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
        }

        .preview-item {
            text-align: center;
        }

        .preview-item img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview-item label {
            display: block;
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            font-weight: 500;
        }

        .message.active {
            display: block;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .results-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .result-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result-label {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .result-value {
            color: #333;
            font-family: monospace;
            word-break: break-all;
        }

        .file-info {
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f2ff;
            border-radius: 5px;
            display: none;
        }

        .file-info.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 License Plate Detector</h1>
            <p>Upload an image to detect license plates</p>
        </div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Click to upload or drag and drop</div>
                <div class="upload-subtext">PNG, JPG, JPEG, GIF (Max 16MB)</div>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div class="button-group">
            <button class="btn-predict" id="predictBtn" disabled>Detect License Plates</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing image... This may take a moment.</p>
        </div>

        <div class="message" id="message"></div>

        <div class="preview-section" id="previewSection">
            <div class="preview-title">Preview</div>
            <div class="preview-container">
                <div class="preview-item">
                    <img id="previewImage" src="" alt="Preview">
                    <label>Processed Image (640x640)</label>
                </div>
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="preview-title">Detection Results</div>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const predictBtn = document.getElementById('predictBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const message = document.getElementById('message');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const resultsSection = document.getElementById('resultsSection');
        const resultsContent = document.getElementById('resultsContent');
        const fileInfo = document.getElementById('fileInfo');

        let selectedFile = null;

        // File upload event listeners
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('Please select a valid image file', 'error');
                return;
            }

            if (file.size > 16 * 1024 * 1024) {
                showMessage('File size exceeds 16MB limit', 'error');
                return;
            }

            selectedFile = file;
            predictBtn.disabled = false;

            // Show file info
            const fileSize = (file.size / 1024).toFixed(2);
            fileInfo.textContent = `File: ${file.name} (${fileSize}KB)`;
            fileInfo.classList.add('active');

            showMessage(`File selected: ${file.name}`, 'info');
        }

        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                showMessage('Please select a file first', 'error');
                return;
            }

            await runPrediction();
        });

        clearBtn.addEventListener('click', () => {
            clearAll();
        });

        async function runPrediction() {
            try {
                loading.classList.add('active');
                predictBtn.disabled = true;
                message.classList.remove('active');

                const formData = new FormData();
                formData.append('file', selectedFile);

                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                    showMessage(data.message, 'success');
                } else {
                    throw new Error(data.error || 'Prediction failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(`Error: ${error.message}`, 'error');
            } finally {
                loading.classList.remove('active');
                predictBtn.disabled = false;
            }
        }

        function displayResults(data) {
            // Display preview image
            if (data.image) {
                previewImage.src = data.image;
                previewSection.classList.add('active');
            }

            // Display results
            resultsContent.innerHTML = '';
            
            if (data.results && data.results.length > 0) {
                data.results.forEach((result, index) => {
                    const resultHTML = `
                        <div class="result-item">
                            <div class="result-label">Detection ${index + 1}</div>
                            <div class="result-value">${JSON.stringify(result, null, 2)}</div>
                        </div>
                    `;
                    resultsContent.innerHTML += resultHTML;
                });
            } else {
                resultsContent.innerHTML = '<div class="result-item"><div class="result-label">No detections found</div></div>';
            }

            if (data.original_size) {
                const sizeInfo = `
                    <div class="result-item">
                        <div class="result-label">Processing Information</div>
                        <div class="result-value">
                            Original Size: ${data.original_size[0]}×${data.original_size[1]}px<br>
                            Processed Size: ${data.processed_size[0]}×${data.processed_size[1]}px
                        </div>
                    </div>
                `;
                resultsContent.innerHTML += sizeInfo;
            }

            resultsSection.classList.add('active');
        }

        function showMessage(text, type = 'info') {
            message.textContent = text;
            message.className = `message ${type} active`;
            setTimeout(() => {
                message.classList.remove('active');
            }, 5000);
        }

        function clearAll() {
            selectedFile = null;
            fileInput.value = '';
            predictBtn.disabled = true;
            previewSection.classList.remove('active');
            resultsSection.classList.remove('active');
            fileInfo.classList.remove('active');
            message.classList.remove('active');
            showMessage('Cleared', 'info');
        }
    </script>
</body>
</html>
